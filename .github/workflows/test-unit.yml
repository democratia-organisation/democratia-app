name: unitTest

on:
  pull_request:
    branches: [ main, "developpment" ]
  push:
    branches: ["developpment"]


jobs:
  test-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true
      - name: Install MAUI Workload
        run: dotnet workload install maui
      - name: Build and Run UnitTests
        run: |
          dotnet build com.democratia.test/com.democratia.test.csproj
          dotnet test  com.democratia.test/com.democratia.test.csproj --no-build --verbosity normal
