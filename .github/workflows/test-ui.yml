name: UITest

on:
  pull_request:
    branches: [ main, "developpment" ]
  push:
    branches: ["developpment"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  run-tests:
    name: Test ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: windows-latest
            project: "UITests.Android/UITests.Android.csproj"
          - platform: Windows
            os: windows-latest
            project: "UITests.Windows/UITests.Windows.csproj"
          - platform: macOS
            os: macos-latest
            project: "UITests.macOS/UITests.macOS.csproj"
          - platform: iOS
            os: macos-latest
            project: "UITests.iOS/UITests.iOS.csproj"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Create appsettings (Secrets)
        run: |
          mkdir -p ./com.democratia.core
          echo '${{ secrets.APPSETTINGS_PRODUCTION_JSON }}' > ./com.democratia.core/appsettings.production.json
          echo '${{ secrets.APPSETTINGS_JSON }}' > ./com.democratia.core/appsettings.json
          echo '${{ secrets.APPSETTINGS_DEVELOPPEMENT_JSON }}' > ./com.democratia.core/appsettings.developpement.json
        shell: bash 

      - name: Build and Run Tests
        run: |
          dotnet build com.democratia.mauiTest/${{ matrix.project }} -c Release
          dotnet test com.democratia.mauiTest/${{ matrix.project }} -c Release --no-build --logger "trx;LogFileName=${{ matrix.platform }}_results.trx" --verbosity normal

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.platform }}
          path: "**/TestResults/*.trx"